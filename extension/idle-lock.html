<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idle Check</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #111827;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.24), transparent 34%),
        radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.18), transparent 36%),
        #07111f;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: rgba(2, 6, 23, 0.52);
      backdrop-filter: blur(12px);
    }

    .dialog {
      width: min(100%, 520px);
      border: 1px solid rgba(226, 232, 240, 0.3);
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 28px 100px rgba(0, 0, 0, 0.42);
      padding: 34px;
      text-align: center;
    }

    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #fff;
      font-size: 30px;
      font-weight: 900;
    }

    h1 {
      font-size: 26px;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    p {
      color: #475569;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      min-width: 160px;
      border: 0;
      border-radius: 13px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      background: #111827;
      color: #fff;
    }

    .secondary {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #111827;
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="idleTitle">
      <div class="mark">!</div>
      <h1 id="idleTitle">Are you working or sleeping?</h1>
      <p>No activity has been detected for the last 20 seconds.</p>
      <div class="actions">
        <button id="workingBtn" class="primary" type="button">I'm Working</button>
        <button id="breakBtn" class="secondary" type="button">Take a Break</button>
      </div>
    </section>
  </main>
  <script src="idle-lock.js"></script>
</body>
</html>
